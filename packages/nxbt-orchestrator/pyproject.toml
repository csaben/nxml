[project]
name = "nxbt-orchestrator"
version = "0.1.0"
description = "Bluetooth controller server (HTTP + WebSocket) for the nxml ecosystem"
# nxbt + pybluez are pinned to system Python 3.11. This package is intended to
# be installed with `uv tool install` outside the main 3.14 workspace venv.
requires-python = ">=3.10"
authors = [{ name = "Clark Saben" }]
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "nx-packets",
    "nxbt>=0.1.4",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2",
]

[project.urls]
Repository = "https://github.com/csaben/nxml"
Issues = "https://github.com/csaben/nxml/issues"

[project.scripts]
nxbt-orchestrator = "nxbt_orchestrator.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nxbt_orchestrator"]

[tool.uv.sources]
# This package is excluded from the workspace (Python 3.11 vs 3.14 mismatch),
# so we can't use `workspace = true` here. Path source resolves both when
# `uv tool install` is run from inside this directory and from the repo root.
nx-packets = { path = "../nx-packets" }

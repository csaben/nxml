[project]
name = "nxml-capture"
version = "0.1.0"
description = "Frame capture, controller-state subscription, and frame↔action synchronization for the nxml ecosystem"
requires-python = ">=3.14"
authors = [{ name = "Clark Saben" }]
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "numpy>=1.26",
    "opencv-python>=4.9",
    "websockets>=13",
    "nx-packets",
    "nxml-core",
    "av>=12",
    "pyarrow>=17",
]

[project.urls]
Repository = "https://github.com/csaben/nxml"
Issues = "https://github.com/csaben/nxml/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nxml_capture"]

[tool.uv.sources]
nx-packets = { workspace = true }
nxml-core = { workspace = true }

[project]
name = "nx-packets"
version = "0.1.0"
description = "Canonical Nintendo Switch input packet types and the 26-dim action contract"
requires-python = ">=3.10"
authors = [{ name = "Clark Saben" }]
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "numpy>=1.26",
    "pydantic>=2",
]

[project.urls]
Repository = "https://github.com/csaben/nxml"
Issues = "https://github.com/csaben/nxml/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nx_packets"]

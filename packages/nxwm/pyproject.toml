[project]
name = "nxwm"
version = "0.1.0"
description = "World model training, inference, and serving for Nintendo Switch games"
requires-python = ">=3.14"
authors = [{ name = "Clark Saben" }]
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "nxml-core",
    "nx-packets",
    "torch>=2.10",
    "torchvision>=0.25",
    "diffusers>=0.27",
    "numpy>=1.26",
    "einops>=0.8",
    "pyyaml>=6",
    "pydantic>=2.7",
    "click>=8.1",
    "huggingface-hub>=0.24",
    "opencv-python>=4.10.0",
    "pyzmq>=26",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "websockets>=13",
    "pillow>=10",
    "torchcodec>=0.4",
    "pyarrow>=17",
    "accelerate>=1.13.0",
]

[project.optional-dependencies]
training = [
    "wandb>=0.18",
    "python-dotenv>=1",
]
# Opt-in: ship the pokemon_za game adapters (detectors, default templates).
# Required for `nxwm ui ... --detector pokemon_za:...`. Skipped by default
# so a vanilla `nxwm` install stays game-agnostic.
pokemon-za = [
    "nxml-games",
]

[project.urls]
Repository = "https://github.com/csaben/nxml"
Issues = "https://github.com/csaben/nxml/issues"

[project.scripts]
nxwm = "nxwm.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nxwm"]

[tool.uv.sources]
nxml-core = { workspace = true }
nx-packets = { workspace = true }
nxml-games = { workspace = true }
torch = [{ index = "pytorch-cu128" }]
torchvision = [{ index = "pytorch-cu128" }]
# torchcodec = [{ index = "pytorch-cu128" }]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

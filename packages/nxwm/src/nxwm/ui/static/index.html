<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1080, initial-scale=1" />
<title>nxwm-ui · {{GAME}}</title>
<link rel="stylesheet" href="/static/ui.css" />
</head>
<body>
<main class="viewport">

  <section class="frame-pane" id="frame-pane">
    <img id="frame" alt="world model frame" />
    <button id="fullscreen-btn" type="button" title="toggle fullscreen (f)" aria-label="toggle fullscreen">
      <svg id="fullscreen-icon-enter" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M5 5h6V3H3v8h2V5zm14 0v6h2V3h-8v2h6zM5 19v-6H3v8h8v-2H5zm14-6v6h-6v2h8v-8h-2z" />
      </svg>
      <svg id="fullscreen-icon-exit" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" style="display:none">
        <path fill="currentColor" d="M5 11h6V5H9v4H5v2zm10 0h6V9h-4V5h-2v6zm-4 10h2v-4h4v-2h-6v6zm4-6h6v-2h-4V9h-2v6z" />
      </svg>
    </button>
    <div id="frame-empty">
      <p class="big">connect a gamepad and press <kbd>start/+</kbd> to play</p>
      <p class="small">or click <button id="step-btn-empty" type="button">step</button> for a single frame</p>
    </div>
  </section>

  <section class="hud">
    <div class="row">
      <div class="status" id="status">loading…</div>
      <button id="play-btn" type="button">▶ play</button>
      <label>fps <input id="fps" type="number" min="1" max="60" value="30" /></label>
      <button id="step-btn" type="button">step</button>
    </div>

    <div class="row">
      <div class="gamepad-status" id="gamepad-status">no gamepad</div>
      <label class="toggle"><input type="checkbox" id="invert-y" checked /> invert Y</label>
    </div>

    <div class="row">
      <label>episode
        <select id="episode-select"></select>
      </label>
      <label>frame
        <input id="reseed-start" type="number" value="0" />
      </label>
      <button id="reseed-btn" type="button">reseed</button>
    </div>

    <div class="row">
      <input id="reload-path" type="text" placeholder="model path or hf:owner/repo/file.pt" />
      <button id="reload-btn" type="button">reload</button>
    </div>

    <details class="detector-panel" id="detector-panel" hidden>
      <summary>detector <span id="detector-name" class="muted"></span></summary>
      <div class="detector-readout">
        <span class="lamp" id="detector-lamp" data-detected="false"></span>
        <span class="readout-line" id="detector-readout-line">—</span>
        <button id="detector-reset-btn" type="button" title="reset streak">↺ streak</button>
        <button id="detector-copy-btn" type="button" title="copy current params as YAML">copy yaml</button>
      </div>
      <div id="detector-sliders"></div>
      <img id="detector-debug" alt="detector debug view" />
    </details>

    <details class="info-panel">
      <summary>info</summary>
      <pre id="info-json">…</pre>
    </details>
  </section>
</main>

<script src="/static/ui.js" defer></script>
</body>
</html>

[project]
name = "nxml-mux"
version = "0.1.0"
description = "Action arbitration: multiplex multiple controller/policy/macro sources into a single nx_packets action stream"
requires-python = ">=3.14"
authors = [{ name = "Clark Saben" }]
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "numpy>=1.26",
    "pyyaml>=6",
    "evdev>=1.7",
    "nx-packets",
    "nxml-core",
]

[project.urls]
Repository = "https://github.com/csaben/nxml"
Issues = "https://github.com/csaben/nxml/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nxml_mux"]

[tool.hatch.build.targets.wheel.force-include]
"src/nxml_mux/input_devices/mappers/xbox_one.yaml" = "nxml_mux/input_devices/mappers/xbox_one.yaml"

[tool.uv.sources]
nx-packets = { workspace = true }
nxml-core = { workspace = true }

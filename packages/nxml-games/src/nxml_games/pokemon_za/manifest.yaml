name: pokemon_za
version: 0.1.0
display_name: "Pokémon ZA — Battle Shaping"

# Default world-model checkpoint to suggest in nxwm UI / nxml-coplay when
# this game is selected. Override per-run via CLI / config.
default_wm: hf:csaben/za-wm-v3.pt

# Action vector layout (matches nx_packets.ACTION_DIM=26).
# Sticks: indices 0-3 (L_X, L_Y, R_X, R_Y) in [-1, 1].
# Buttons: indices 4-25, names per nx_packets.BUTTON_NAMES.
attack_buttons: [Y, X, B, A]   # action indices 22, 23, 24, 25

# Presets ship under presets/. Listed here for nxml-games CLI listing.
presets:
  - escape_stuck

# Bundled assets — resolved via importlib.resources by callers (nxml-coplay
# seeds the two default Triggers from these PNGs on first launch).
assets:
  end_screen: end_screen.png
  connection_lost: connection_lost.png

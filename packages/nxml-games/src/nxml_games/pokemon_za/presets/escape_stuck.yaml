# Pokémon ZA — escape_stuck preset.
#
# Seed-based rollouts with target_ui detection + locked_attack +
# unique_acquisition + png_similarity_penalty + sliding_stagnation. PPO
# knobs: lr=7.5e-5, gamma=0.995, button bias on Y/X/B/A = +8.0.
#
# Edit before running:
#   - world_model.ckpt_path / bc_init.ckpt_path
#   - reward.kwargs.config.target_ui_detection.template_path
#     (point at your local copy of bottom-right-ui.PNG)
#   - reward.kwargs.config.png_similarity_penalty.paths
#     (your collected miss-state PNGs; comment the block out to skip)
#   - seeds[*].npz_path (after the data round-trip lands them in your tree)

policy:
  name: ppo_policy_v1
  config:
    base_policy_name: bc_transformer_v1
    base_policy_config:
      sequence_length: 300
      hidden_size: 512
      num_layers: 4
      num_heads: 8
      dropout: 0.3
    action_std_init: 0.3

algorithm:
  name: ppo
  config:
    lr: 7.5e-5
    gamma: 0.995
    gae_lambda: 0.97
    clip_epsilon: 0.1
    vf_coef: 0.5
    ent_coef: 0.01
    bc_reg_coef: 1.0
    max_grad_norm: 0.5
    ppo_epochs: 2
    minibatch_size: 64
    rollouts_per_update: 10
    total_updates: 1000
    flow_steps: 5
    cfg_scale: 1.0
    # +8.0 bias on Y/X/B/A in the raw 22-dim button head (logits 18-21,
    # action vector 22-25). Keeps attack presses non-zero throughout PPO.
    button_logit_bias_indices: [18, 19, 20, 21]
    button_logit_bias_value: 8.0
    project_name: nxrl-ppo-pokemon-za

world_model:
  ckpt_path: checkpoints/legacy/wm_dit_v1.pt

bc_init:
  ckpt_path: checkpoints/legacy/bc_transformer_v1_seq300.pt

rollout:
  frames: 150          # 5s @ 30fps
  goal_offset: 30

# 12 battle-start seeds from run_062. Set base_path to wherever your
# encoded latents live (output of `nxwm encode`).
seeds:
  - {npz_path: data/za-latents/recorded-episodes/20260406_151519_11-15am_part1.npz, start_frame: 0}
  - {npz_path: data/za-latents/recorded-episodes/20260406_145009_10-50am_part0.npz, start_frame: 0}
  - {npz_path: data/za-latents/recorded-episodes/20260406_151519_11-15am_part0.npz, start_frame: 0}
  - {npz_path: data/za-latents/online/20260222_232608_6-26pm_part0.npz,             start_frame: 45}
  - {npz_path: data/za-latents/recorded-episodes/20260406_151519_11-15am_part0.npz, start_frame: 39}
  - {npz_path: data/za-latents/online/20260221_051425_12-14am_part0.npz,            start_frame: 636}
  - {npz_path: data/za-latents/recorded-episodes/20260406_151519_11-15am_part2.npz, start_frame: 945}
  - {npz_path: data/za-latents/recorded-episodes/20260406_143027_10-30am_part1.npz, start_frame: 21}
  - {npz_path: data/za-latents/recorded-episodes/20260406_144545_10-45am_part1.npz, start_frame: 21}
  - {npz_path: data/za-latents/recorded-episodes/20260406_144545_10-45am_part1.npz, start_frame: 691}
  - {npz_path: data/za-latents/recorded-episodes/20260406_145009_10-50am_part0.npz, start_frame: 691}
  - {npz_path: data/za-latents/online/20260221_051841_12-18am_part1.npz,            start_frame: 1184}

# The 13-component pokemon_za reward, exact replica of run_062's reward_shaping
# block. The factory builds a RewardConfig from this nested dict.
reward:
  callable: nxml_games.pokemon_za:make_reward_fn
  kwargs:
    vae_path: stabilityai/sd-vae-ft-mse
    config:
      reward_type: seed-based
      start_frame_idx: 0
      goal_frame_idx: -1

      target_ui_detection:
        template_path: reward-signals/bottom-right-ui.PNG
        score_threshold: 0.15
        sat_threshold: 68.0
        min_consecutive_hits: 5
        reward_per_step: 0.2
        streak_ramp_scale: 0.05

      unique_acquisition:
        bonus_per_target: 3.0
        chain_multiplier: 1.0
        min_latent_move: 0.20
        min_unlocked_frames: 15

      locked_attack:
        button_indices: [22, 23, 24, 25]
        reward_per_step: 0.2
        require_min_streak: 1

      sliding_stagnation:
        window: 30
        cos_threshold: 0.95
        min_consecutive_hits: 1
        reward_per_step: -0.3
        grace_period: 30

      # png_similarity_penalty intentionally omitted from the preset —
      # paths are environment-specific. Add a `png_similarity_penalty:`
      # block here with a `paths:` list when you've staged the captures.

run:
  checkpoint_frequency: 50
  snapshot_frequency: 50

[project]
name = "nxml-games"
version = "0.1.0"
description = "Game-specific reward shaping, terminations, seeds, presets, and client logic for nxml. Each sub-package is the eventual extraction target for its own pip-installable env package."
requires-python = ">=3.14"
authors = [{ name = "Clark Saben" }]
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "nxml-core",
    "nx-packets",
    "nxwm",
    "torch>=2.10",
    "numpy>=1.26",
    "opencv-python>=4.10.0",
    "diffusers>=0.27",
    "pyyaml>=6",
]

[project.urls]
Repository = "https://github.com/csaben/nxml"
Issues = "https://github.com/csaben/nxml/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nxml_games"]

[tool.hatch.build.targets.wheel.force-include]
"src/nxml_games/pokemon_za/assets/end_screen.png" = "nxml_games/pokemon_za/assets/end_screen.png"
"src/nxml_games/pokemon_za/assets/connection_lost.png" = "nxml_games/pokemon_za/assets/connection_lost.png"
"src/nxml_games/pokemon_za/manifest.yaml" = "nxml_games/pokemon_za/manifest.yaml"
"src/nxml_games/pokemon_za/presets/escape_stuck.yaml" = "nxml_games/pokemon_za/presets/escape_stuck.yaml"

[tool.uv.sources]
nxml-core = { workspace = true }
nx-packets = { workspace = true }
nxwm = { workspace = true }
torch = [{ index = "pytorch-cu128" }]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

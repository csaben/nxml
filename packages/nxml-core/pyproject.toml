[project]
name = "nxml-core"
version = "0.1.0"
description = "Shared protocols, registries, and checkpoint format for the nxml ecosystem"
requires-python = ">=3.14"
authors = [{ name = "Clark Saben" }]
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "pyyaml>=6",
    "pydantic>=2.7",
]

[project.urls]
Repository = "https://github.com/csaben/nxml"
Issues = "https://github.com/csaben/nxml/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nxml_core"]